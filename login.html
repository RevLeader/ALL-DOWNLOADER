<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>yt-dlp Console — Login</title>
<style>
  :root {
    --bg: #0b0b0e;
    --panel: #15151a;
    --border: #2a2a30;
    --text: #e8e6e1;
    --muted: #8a8a92;
    --accent: #d9a441;
    --error: #e0556a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    color: var(--text);
    font-family: "SF Mono", "Cascadia Code", Consolas, monospace;
  }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 40px;
    width: 320px;
  }
  h1 {
    font-size: 18px;
    margin: 0 0 4px;
    color: var(--accent);
  }
  p.sub {
    margin: 0 0 24px;
    color: var(--muted);
    font-size: 13px;
  }
  label {
    display: block;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 6px;
  }
  input[type="password"] {
    width: 100%;
    padding: 10px 12px;
    background: #0e0e12;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    margin-bottom: 16px;
  }
  input[type="password"]:focus {
    outline: none;
    border-color: var(--accent);
  }
  button {
    width: 100%;
    padding: 10px;
    background: var(--accent);
    color: #1a1305;
    border: none;
    border-radius: 6px;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
  }
  button:hover { opacity: 0.9; }
  button:disabled { opacity: 0.5; cursor: default; }
  .error {
    color: var(--error);
    font-size: 13px;
    margin: -4px 0 16px;
    min-height: 16px;
  }
</style>
</head>
<body>
  <div class="card">
    <h1>yt-dlp console</h1>
    <p class="sub">enter the access passphrase</p>
    <form id="login-form">
      <label for="passphrase">Passphrase</label>
      <input type="password" id="passphrase" name="passphrase" autofocus autocomplete="current-password" required>
      <div class="error" id="error-msg"></div>
      <button type="submit" id="submit-btn">Enter</button>
    </form>
  </div>

  <script>
    const form = document.getElementById('login-form');
    const errorMsg = document.getElementById('error-msg');
    const submitBtn = document.getElementById('submit-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.textContent = '';
      submitBtn.disabled = true;
      submitBtn.textContent = 'Checking...';

      const passphrase = document.getElementById('passphrase').value;

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ passphrase }),
        });

        if (res.ok) {
          window.location.href = '/';
        } else {
          errorMsg.textContent = 'Incorrect passphrase.';
          submitBtn.disabled = false;
          submitBtn.textContent = 'Enter';
        }
      } catch (err) {
        errorMsg.textContent = 'Could not reach the server. Try again.';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Enter';
      }
    });
  </script>
</body>
</html>
